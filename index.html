<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 게시물 시스템</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: #007bff; color: white; padding: 20px; text-align: center; }
        .post-form { padding: 20px; border-bottom: 1px solid #eee; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .posts { padding: 20px; }
        .post { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #007bff; }
        .post h3 { margin: 0 0 10px 0; }
        .delete-btn { background: #dc3545; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 웹 게시물 시스템</h1>
            <p>간단한 게시물 작성 및 관리</p>
        </header>

        <div class="post-form">
            <h2>새 게시물 작성</h2>
            <input type="text" id="title" placeholder="제목을 입력하세요">
            <textarea id="content" rows="5" placeholder="내용을 입력하세요"></textarea>
            <button onclick="createPost()">게시하기</button>
        </div>

        <div class="posts" id="posts-container">
            <h2>게시물 목록</h2>
        </div>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('posts')) || [];

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '<h2>게시물 목록</h2>';

            if (posts.length === 0) {
                container.innerHTML += '<p>아직 게시물이 없습니다.</p>';
                return;
            }

            posts.forEach((post, index) => {
                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <h3>${post.title}</h3>
                    <p>${post.content}</p>
                    <small>작성일: ${post.date}</small>
                    <button class="delete-btn" onclick="deletePost(${index})">삭제</button>
                `;
                container.appendChild(postEl);
            });
        }

        function createPost() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!title || !content) {
                alert('제목과 내용을 모두 입력해주세요!');
                return;
            }

            posts.unshift({
                title,
                content,
                date: new Date().toLocaleString('ko-KR')
            });

            localStorage.setItem('posts', JSON.stringify(posts));
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            renderPosts();
        }

        function deletePost(index) {
            if (confirm('이 게시물을 삭제하시겠습니까?')) {
                posts.splice(index, 1);
                localStorage.setItem('posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        // 초기 렌더링
        window.onload = renderPosts;
    </script>
</body>
</html>
